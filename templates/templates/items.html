 <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GULLY MART</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="/Users/Home/Desktop/final-gully-mart/static/css/styles.css">
        <link rel="stylesheet" href="/Users/Home/Desktop/final-gully-mart/static/css/items.css">
    </head>

    <body>

        <!-- ================= TOP NAVBAR ================= -->
        <div class="top-nav">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="GULLY MART">
                </a>
            </div>

            <div styles="color:#ffffff; font-weight: bold;">
                <a href="location.html" style="color:#ffffff;">📍 Select Location</a>
                <div onclick="window.location.href='location.html'" class="location-bar">
                    <span id="showLocation">Select Location</span>
                </div>
            </div>

            <div class="search-bar">
                <select>
                    <option>All</option>
                </select>
                <input type="text" placeholder="Search GULLY MART.in">
                <button class="search-btn">🔍</button>
            </div>

            <div class="nav-item">
                <small>Hello</small>
                <strong>Sign in</strong>
            </div>

            <div class="nav-item">
                <small>Returns</small>
                <strong>& Orders</strong>
            </div>

            <a href="cart.html">
                <img src="cart_image.png" class="cart" alt="Cart">
            </a>
        </div>

        <!-- ================= BOTTOM NAVBAR ================= -->
        <nav class="navbar navbar-dark bg-dark bottom-navbar">
            <div class="container-fluid">
                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvasMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <span class="navbar-brand ms-2"><a href="cart.html">View Cart</a></span>

                <div class="offcanvas offcanvas-start text-bg-dark" id="offcanvasMenu">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title">Menu</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="offcanvas">
                        </button>
                    </div>

                    <div class="offcanvas-body">
                        <ul class="navbar-nav">
                            <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Offers</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Groceries</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Vegetables</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Snacks</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- ================= ITEMS SECTION ================= -->
        <div class="items-section">

    <!-- Categories -->
            <div class="categories">
                <button onclick="filterItems('all')">All</button>
                <button onclick="filterItems('rice')">Rice</button>
                <button onclick="filterItems('soaps')">Soaps</button>
                <button onclick="filterItems('oils')">Oils</button>
                <button onclick="filterItems('vegetables')">Vegetables</button>
                <button onclick="filterItems('dairy')">Dairy</button>
            </div>

    <!-- Products Grid -->
            <div
                class="products-container"
                id="productsContainer"
            >
            </div>

        </div>

        <script src="/Users/Home/Desktop/final-gully-mart/static/js/items.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/Users/Home/Desktop/final-gully-mart/static/js/index.js"></script>

    </body>
</html>
