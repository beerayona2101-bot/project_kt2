<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GULLY MART</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="/Users/Home/Desktop/final-gully-mart/static/css/styles.css">
        <link rel="stylesheet" href="/Users/Home/Desktop/final-gully-mart/static/css/cart.css">
    </head>

    <body>

        <!-- ================= TOP NAVBAR ================= -->
        <div class="top-nav">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="GULLY MART">
                </a>
            </div>

            <div styles="color:#ffffff; font-weight: bold;">
                <a href="location.html" style="color:#ffffff;">📍 Select Location</a>
                <div onclick="window.location.href='location.html'" class="location-bar">
                    <span id="showLocation">Select Location</span>
                </div>
            </div>

            <div class="search-bar">
                <select>
                    <option>All</option>
                </select>
                <input type="text" placeholder="Search GULLY MART.in">
                <button class="search-btn">🔍</button>
            </div>

            <div class="nav-item">
                <small>Hello</small>
                <strong>Sign in</strong>
            </div>

            <div class="nav-item">
                <small>Returns</small>
                <strong>& Orders</strong>
            </div>

            <a href="cart.html">
                <img src="cart_image.png" class="cart" alt="Cart">
            </a>
        </div>

        <div class="cart-header">
            Your Cart
        </div>

        <div id="cartItems" class="cart-items"></div>

        <div class="bill-section">
            <div class="bill-row">
                <span>Subtotal</span>
                <span id="subtotal">₹0</span>
            </div>

            <div class="bill-row">
                <span>Delivery Fee</span>
                <span>₹20</span>
            </div>

            <hr>

            <div class="bill-row total">
                <span>Total</span>
                <span id="total">₹0</span>
            </div>

            <a href="checkout.html">
                <button class="checkout-btn">
                    Proceed to Checkout
                </button>
            </a>
        </div>


        <script src="/Users/Home/Desktop/gully-mart/static/js/cart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/Users/Home/Desktop/final-gully-mart/static/js/index.js"></script>
    </body>
</html>
