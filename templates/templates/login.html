<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GULLY MART - Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- EXISTING SITE CSS -->
    <link rel="stylesheet" href="/Users/Home/Desktop/gully-mart/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/cart.css">

    <!-- LOGIN ONLY CSS -->
    <link rel="stylesheet" href="/Users/Home/Desktop/gully-mart/static/css/login.css">
</head>

<body>

<!-- ================= TOP NAVBAR ================= -->
<div class="top-nav">
    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="GULLY MART">
        </a>
    </div>

    <div style="color:#ffffff; font-weight: bold;">
        <a href="location.html" style="color:#ffffff;">📍 Select Location</a>
        <div onclick="window.location.href='location.html'" class="location-bar">
            <span id="showLocation">Select Location</span>
        </div>
    </div>

    <div class="search-bar">
        <select>
            <option>All</option>
        </select>
        <input type="text" placeholder="Search GULLY MART.in">
        <button class="search-btn">🔍</button>
    </div>

    <div class="nav-item">
        <small>Hello</small>
        <strong>Sign in</strong>
    </div>

    <div class="nav-item">
        <small>Returns</small>
        <strong>& Orders</strong>
    </div>

    <a href="cart.html">
        <img src="cart_image.png" class="cart" alt="Cart">
    </a>
</div>

<!-- ================= LOGIN CARD ================= -->
<div class="login-wrapper">
    <div class="login-card" id="loginCard">

        <!-- LEFT SIDE -->
        <div class="login-left">
            <h2 id="leftTitle">Mobile Login</h2>
            <p id="leftText">Login using your mobile number</p>
            <button onclick="switchLogin()">Use Email</button>
        </div>

        <!-- RIGHT SIDE -->
        <div class="login-right">

            <div id="loginForm">
                <h3 id="formTitle">Mobile Login</h3>

                <input type="text" id="identity" placeholder="Mobile Number">
                <input type="password" id="password" placeholder="Password">

                <button onclick="sendOTP()">Continue</button>
            </div>

            <div id="otpForm" class="login-hidden">
                <h3>OTP Verification</h3>
                <input type="text" id="otp" placeholder="Enter OTP">
                <button onclick="verifyOTP()">Verify OTP</button>
            </div>

            <p id="loginMsg"></p>
        </div>

    </div>
    <div class="pg-down-buttons">
        <button class="back-button" onclick="window.location.href='index.html'">Back to Home</button>
        <button class="back-button" onclick="window.location.href='location.html'">Next</button>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/Users/Home/Desktop/gully-mart/static/js/login.js"></script>
</body>
</html>
